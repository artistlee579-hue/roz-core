<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.O.Z. - Robot Operating Zystem</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-color: #161b22;
            --accent-color: #58a6ff;
            --text-color: #c9d1d9;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            height: 100vh;
        }
        #sidebar {
            width: 250px;
            background-color: var(--panel-color);
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            padding: 15px;
            gap: 10px;
        }
        #chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-color);
        }
        #chat-history {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 75%;
            padding: 12px;
            border-radius: 8px;
            line-height: 1.4;
            white-space: pre-wrap;
        }
        .user {
            background-color: #238636;
            align-self: flex-end;
            color: white;
        }
        .roz {
            background-color: var(--panel-color);
            border: 1px solid #30363d;
            align-self: flex-start;
        }
        #input-area {
            padding: 20px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #30363d;
        }
        input {
            flex: 1;
            padding: 12px;
            background-color: var(--panel-color);
            border: 1px solid #30363d;
            color: white;
            border-radius: 6px;
        }
        button {
            padding: 12px 24px;
            background-color: var(--accent-color);
            border: none;
            color: black;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }
        .chat-session {
            padding: 10px;
            background: #21262d;
            border-radius: 4px;
            cursor: pointer;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-session:hover { background: #30363d; }
        .delete-btn {
            background: none;
            border: none;
            color: #f85149;
            cursor: pointer;
            padding: 0 5px;
            font-size: 14px;
        }
        .delete-btn:hover { color: #ff7b72; }
        .system-status {
            padding: 10px;
            background: #21262d;
            border-radius: 6px;
            border: 1px solid #30363d;
            font-size: 12px;
            text-align: center;
            color: #8b949e;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3>R.O.Z. System</h3>
        <div class="system-status">
            <span>Local Brain: </span><strong id="status-tag" style="color: #2ea44f;">ONLINE</strong>
        </div>
        <button onclick="createNewChat()">+ New Chat</button>
        <div id="sessions-list" style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px;"></div>
    </div>

    <div id="chat-container">
        <div id="chat-history"></div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Ask R.O.Z. to code your robot..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // Self-contained robotics database template
        const ROBOT_KNOWLEDGE = {
            "ultrasonic": "Hello Gavin! Here is your efficient Ultrasonic Distance Sensor code (Arduino):\n\nconst int trigPin = 9;\nconst int echoPin = 10;\nlong duration;\nint distance;\n\nvoid setup() {\n  pinMode(trigPin, OUTPUT);\n  pinMode(echoPin, INPUT);\n  Serial.begin(9600);\n}\n\nvoid loop() {\n  digitalWrite(trigPin, LOW);\n  delayMicroseconds(2);\n  digitalWrite(trigPin, HIGH);\n  delayMicroseconds(10);\n  digitalWrite(trigPin, LOW);\n  duration = pulseIn(echoPin, HIGH);\n  distance = duration * 0.034 / 2;\n  Serial.print(\"Distance: \");\n  Serial.println(distance);\n  delay(500);\n}",
            "servo": "Hello Gavin! Here is your Servo Motor sweep configuration script (Arduino):\n\n#include <Servo.h>\nServo myServo;\nint pos = 0;\n\nvoid setup() {\n  myServo.attach(9);\n}\n\nvoid loop() {\n  for (pos = 0; pos <= 180; pos += 1) {\n    myServo.write(pos);\n    delay(15);\n  }\n  for (pos = 180; pos >= 0; pos -= 1) {\n    myServo.write(pos);\n    delay(15);\n  }\n}",
            "motor": "Hello Gavin! Here is your DC Motor H-Bridge Driver control code (Python/Raspberry Pi):\n\nimport RPi.GPIO as GPIO\nimport time\n\nMotor1A = 16\nMotor1B = 18\n\nGPIO.setmode(GPIO.BOARD)\nGPIO.setup(Motor1A, GPIO.OUT)\nGPIO.setup(Motor1B, GPIO.OUT)\n\nprint(\"Moving Forward\")\nGPIO.output(Motor1A, GPIO.HIGH)\nGPIO.output(Motor1B, GPIO.LOW)\ntime.sleep(3)\n\nprint(\"Stopping\")\nGPIO.output(Motor1A, GPIO.LOW)\nGPIO.output(Motor1B, GPIO.LOW)\nGPIO.cleanup()",
            "hello": "Hello Gavin! R.O.Z. system is fully responsive. What robotics component are we writing code for today?",
            "hi": "Hello Gavin! R.O.Z. system is fully responsive. What robotics component are we writing code for today?"
        };

        let sessions = JSON.parse(localStorage.getItem('roz_sessions')) || {};
        let currentSessionId = localStorage.getItem('roz_current_id') || "";

        function renderSessions() {
            const list = document.getElementById('sessions-list');
            list.innerHTML = '';
            Object.keys(sessions).forEach(id => {
                const item = document.createElement('div');
                item.className = 'chat-session';
                
                const titleSpan = document.createElement('span');
                titleSpan.innerText = sessions[id].title || `Chat ${id.substring(5,10)}`;
                titleSpan.onclick = () => switchSession(id);
                
                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn';
                delBtn.innerHTML = '❌';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteChat(id);
                };
                
                item.appendChild(titleSpan);
                item.appendChild(delBtn);
                list.appendChild(item);
            });
        }

        function createNewChat() {
            const id = 'chat_' + Date.now();
            sessions[id] = {
                title: `Chat ${Object.keys(sessions).length + 1}`,
                messages: [
                    { role: "assistant", content: "System Online. Hello Gavin, R.O.Z. is ready to program." }
                ]
            };
            saveToStorage();
            currentSessionId = id;
            localStorage.setItem('roz_current_id', id);
            renderSessions();
            renderMessages();
            return id;
        }

        function deleteChat(id) {
            delete sessions[id];
            saveToStorage();
            if (currentSessionId === id) {
                const remainingIds = Object.keys(sessions);
                currentSessionId = remainingIds.length > 0 ? remainingIds : createNewChat();
                localStorage.setItem('roz_current_id', currentSessionId);
            }
            renderSessions();
            renderMessages();
        }

        function switchSession(id) {
            currentSessionId = id;
            localStorage.setItem('roz_current_id', id);
            renderSessions();
            renderMessages();
        }

        function renderMessages() {
            const history = document.getElementById('chat-history');
            history.innerHTML = '';
            if (!currentSessionId || !sessions[currentSessionId]) return;
            sessions[currentSessionId].messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.role === 'user' ? 'user' : 'roz'}`;
                div.innerText = msg.content;
                history.appendChild(div);
            });
            history.scrollTop = history.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;
            if (!currentSessionId) createNewChat();

            input.value = '';
            sessions[currentSessionId].messages.push({ role: "user", content: text });
            if (sessions[currentSessionId].messages.filter(m => m.role === 'user').length === 1) {
                sessions[currentSessionId].title = text.substring(0, 15) + "...";
                renderSessions();
            }
            renderMessages();

            // Process text directly inside the local browser window with zero internet requests
            setTimeout(() => {
                let reply = "Hello Gavin! I am running on your local browser brain. Ask me about: 'ultrasonic', 'servo', or 'motor' to see my code output library generation stream.";
                
                const lowerText = text.toLowerCase();
                for (let key in ROBOT_KNOWLEDGE) {
                    if (lowerText.includes(key)) {
                        reply = ROBOT_KNOWLEDGE[key];
                        break;
                    }
                }
